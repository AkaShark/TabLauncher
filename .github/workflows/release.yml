name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Zip dist (excluding env files)
        run: |
          cd dist
          zip -r "../airss-${GITHUB_REF_NAME}.zip" . --exclude ".env*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: airss-${{ github.ref_name }}
          path: airss-${{ github.ref_name }}.zip

      # Disabled by default — uncomment when M10 distribution playbook is finalized.
